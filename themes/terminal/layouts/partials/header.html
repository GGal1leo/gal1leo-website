<header>
  <div>
    <a href="{{ "/" | relURL }}">
      <h1>{{ lower .Site.Params.author }}@home:~$</h1>
    </a>
    <div class="header-links">
      {{- range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}"><h2 class="header-link">{{ .Name }}</h2></a>
      {{- end }}
    </div>
  </div>
</header>
