{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  {{ range .Pages }}
  <article>
    <h4>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <span>
        <time datetime="{{ .Date.Format "2006-01-02" }}">({{ .Date.Format "02 January 2006" }})</time>
      </span>
    </h4>
  </article>
  {{ end }}
</section>
{{ end }}
